services:
  backend:
    build:
      context: ./RO-Service
      dockerfile: Dockerfile
    container_name: ro-backend
    ports:
      - "4321:4321"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=run.py
      - PYTHONUNBUFFERED=1
    networks:
      - ro-network
    restart: unless-stopped

  frontend:
    build:
      context: ./RO-Visualisation
      dockerfile: Dockerfile
    container_name: ro-frontend
    ports:
      - "8010:80"
    depends_on:
      - backend
    networks:
      - ro-network
    restart: unless-stopped

networks:
  ro-network:
    driver: bridge