services:
  ro-service:
    build:
      context: ./RO-Service
      dockerfile: Dockerfile
    image: ro-service:latest
    container_name: ro-service
    ports:
      - "4321:4321"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=run.py
      - PYTHONUNBUFFERED=1
    networks:
      - ro-network
    restart: unless-stopped

  ro-visualisation:
    build:
      context: ./RO-Visualisation
      dockerfile: Dockerfile
    image: ro-visualisation:latest
    container_name: ro-visualisation
    ports:
      - "8010:80"
    depends_on:
      - ro-service
    networks:
      - ro-network
    restart: unless-stopped

networks:
  ro-network:
    name: ro-network
    driver: bridge
